server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: blob: https:; connect-src 'self' http: https: ws: wss:;" always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # Allow larger file uploads
    client_max_body_size 50M;

    # index.html: never cached (ensures users get latest version after deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # Hashed static assets: cache aggressively (content hash in filename = safe)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Static files with hash patterns (favicon, robots, etc.)
    location ~* \.(js|css|woff2?|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Non-hashed assets (images, JSON manifests)
    location ~* \.(png|jpg|jpeg|gif|svg|webp|avif|json|xml)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # API proxy (standard requests)
    location /api/ {
        proxy_pass http://app:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        proxy_read_timeout 600s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SSE streaming endpoints: extra-long timeout, unbuffered
    location ~ ^/api/(smart-engine/tasks/[^/]+/stream|conversations/[^/]+/messages/stream) {
        proxy_pass http://app:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        proxy_read_timeout 1800s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
