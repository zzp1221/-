<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智学引擎 - 启动中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #020a1a;
    font-family: 'Noto Sans SC', sans-serif;
    color: #fff;
    cursor: pointer;
  }

  canvas#brain {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── UI Overlay ── */
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 0;
    pointer-events: none; z-index: 10;
  }

  .logo-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    margin-top: 18vh;
    opacity: 0; transform: translateY(-20px);
  }
  .logo-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #3b82f6, #60a5fa, #818cf8);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(59, 130, 246, 0.5), 0 0 80px rgba(59, 130, 246, 0.2);
  }
  .logo-icon svg { width: 48px; height: 48px; }

  .title {
    font-size: 72px; font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #e0f2fe, #ffffff 40%, #93c5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.6));
    opacity: 0;
  }

  .subtitle {
    font-size: 22px; font-weight: 400;
    color: #60a5fa;
    letter-spacing: 0.15em;
    opacity: 0;
  }

  .tagline {
    font-size: 15px; font-weight: 400;
    color: #475569;
    letter-spacing: 0.1em;
    margin-top: 6px;
    opacity: 0;
  }

  /* ── Feature labels ── */
  .feature-label {
    position: absolute;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: rgba(15, 30, 60, 0.7);
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    font-size: 15px; font-weight: 500;
    color: #93c5fd;
    opacity: 0;
    white-space: nowrap;
  }
  .feature-label svg { width: 20px; height: 20px; color: #60a5fa; flex-shrink: 0; }
  .feature-label.top-left { top: 18%; left: 12%; }
  .feature-label.top-right { top: 22%; right: 12%; }
  .feature-label.bottom-left { bottom: 28%; left: 10%; }
  .feature-label.bottom-right { bottom: 24%; right: 10%; }

  /* ── Progress bar ── */
  .progress-area {
    position: absolute; bottom: 48px;
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    opacity: 0;
  }
  .progress-bar {
    width: 320px; height: 3px;
    background: rgba(30, 58, 100, 0.4);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
    transition: width 0.3s ease;
  }
  .progress-text {
    display: flex; justify-content: space-between;
    width: 320px;
    font-size: 13px; color: #475569;
    letter-spacing: 0.05em;
  }
  .progress-pct { color: #60a5fa; font-weight: 600; }

  /* ── Connection lines from labels to brain ── */
  .label-line {
    position: absolute;
    background: linear-gradient(90deg, rgba(59,130,246,0.4), rgba(59,130,246,0.05));
    height: 1px;
    opacity: 0;
  }

  /* ── Skip hint ── */
  .skip-hint {
    position: absolute; bottom: 16px;
    font-size: 12px; color: rgba(71, 85, 105, 0.5);
    letter-spacing: 0.05em;
    opacity: 0;
  }
</style>
</head>
<body>
<canvas id="brain"></canvas>

<div class="overlay" id="overlay">
  <!-- Logo -->
  <div class="logo-area" id="logoArea">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        <circle cx="12" cy="10" r="2" fill="white"/>
        <path d="M9 12.5a2 2 0 0 1 6 0" />
      </svg>
    </div>
  </div>

  <!-- Title -->
  <div class="title" id="title">智学引擎</div>
  <div class="subtitle" id="subtitle">智能学习智能体系统</div>
  <div class="tagline" id="tagline">智能驱动学习 ｜ 数据赋能成长 ｜ AI伴随每一步</div>

  <!-- Feature labels -->
  <div class="feature-label top-left" id="f1">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    智能学习
  </div>
  <div class="feature-label top-right" id="f2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/><path d="M12 8v4"/></svg>
    AI 智能体
  </div>
  <div class="feature-label bottom-left" id="f3">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    学情分析
  </div>
  <div class="feature-label bottom-right" id="f4">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
    精准推荐
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span>正在启动智学引擎...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>

  <div class="skip-hint" id="skipHint">点击任意位置或按 Esc 跳过</div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   BRAIN PARTICLE SYSTEM — Front-view neural network
   ══════════════════════════════════════════════════════════════ */

const canvas = document.getElementById('brain');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, brainR;
let particles = [];
let stars = [];
let animId;
let startTime = Date.now();
let skipRequested = false;

/* ── Constants ── */
const PARTICLE_COUNT = 1200;
const STAR_COUNT = 100;
const T_DRIFT = 2500;
const T_FORM = 2800;
const T_LIGHTUP = 2000;
const T_REVEAL = 2500;
const T_PROGRESS = 3000;
const T_HOLD = 800;

/* ── Easing ── */
function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

/* ── Front-view brain shape ── */
/* Roughly circular with subtle interhemispheric fissure at top/bottom */
function brainRAt(angle) {
  let r = 1.0;
  // Top cleft (interhemispheric fissure)
  const topDip = Math.pow(Math.max(0, Math.cos(angle)), 6) * 0.1;
  r -= topDip;
  // Bottom cleft (subtle)
  const botDip = Math.pow(Math.max(0, -Math.cos(angle)), 4) * 0.05;
  r -= botDip;
  // Wider at sides (temporal lobes)
  const sideBulge = Math.pow(Math.abs(Math.sin(angle)), 4) * 0.08;
  r += sideBulge;
  // Full, round overall
  return r;
}

function isInsideBrain(lx, ly) {
  const angle = Math.atan2(ly, lx);
  const r = Math.sqrt(lx * lx + ly * ly);
  const maxR = brainRAt(angle) * brainR;
  return r < maxR;
}

/* ── Spatial hash ── */
function buildSpatialHash(pts, cellSize) {
  const grid = new Map();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const key = `${Math.floor(p.x / cellSize)},${Math.floor(p.y / cellSize)}`;
    let bucket = grid.get(key);
    if (!bucket) { bucket = []; grid.set(key, bucket); }
    bucket.push(i);
  }
  return { grid, cellSize };
}

function getNeighbors(hash, x, y, radius) {
  const result = [];
  const cr = Math.ceil(radius / hash.cellSize);
  const gx = Math.floor(x / hash.cellSize);
  const gy = Math.floor(y / hash.cellSize);
  for (let dx = -cr; dx <= cr; dx++) {
    for (let dy = -cr; dy <= cr; dy++) {
      const bucket = hash.grid.get(`${gx + dx},${gy + dy}`);
      if (bucket) result.push(...bucket);
    }
  }
  return result;
}

/* ── Init ── */
function resize() {
  W = canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
  H = canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  const dpr = window.devicePixelRatio || 1;
  cx = window.innerWidth / 2;
  cy = window.innerHeight * 0.36;
  brainR = Math.min(window.innerWidth, window.innerHeight) * 0.28;
}

function initParticles() {
  particles = [];
  const vw = window.innerWidth, vh = window.innerHeight;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const maxR = brainRAt(angle) * brainR;
    const r = Math.random() * maxR * 0.95;
    const tx = cx + Math.cos(angle) * r;
    const ty = cy + Math.sin(angle) * r;

    // Start: scattered far from center
    const startAngle = Math.random() * Math.PI * 2;
    const startDist = 200 + Math.random() * Math.max(window.innerWidth, window.innerHeight) * 0.5;

    const isJunction = Math.random() < 0.04;

    particles.push({
      x: cx + Math.cos(startAngle) * startDist,
      y: cy + Math.sin(startAngle) * startDist,
      prevX: cx + Math.cos(startAngle) * startDist,
      prevY: cy + Math.sin(startAngle) * startDist,
      tx, ty,
      size: isJunction ? 2.0 + Math.random() * 1.5 : 0.5 + Math.random() * 1.6,
      alpha: isJunction ? 1.0 : 0.6 + Math.random() * 0.35,
      hue: 210 + Math.random() * 30, // deep blue 210-240
      glowPhase: Math.random() * Math.PI * 2,
      isJunction,
      spiralAngle: startAngle,
    });
  }
}

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: 0.3 + Math.random() * 1.2,
      speed: 0.5 + Math.random() * 2,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

/* ═══════════════════ RENDER ═══════════════════ */

function render() {
  if (skipRequested) return;

  const elapsed = Date.now() - startTime;
  const dpr = window.devicePixelRatio || 1;
  const dw = W / dpr;
  const dh = H / dpr;

  ctx.save();
  ctx.scale(dpr, dpr);
  const dw2 = dw, dh2 = dh;
  // Use CSS viewport dimensions (not DPR-scaled) for centering
  const vw = window.innerWidth, vh = window.innerHeight;
  const ccx = vw / 2, ccy = vh * 0.36;

  // Phase progress
  const formT = elapsed > T_DRIFT ? easeInOutCubic(clamp((elapsed - T_DRIFT) / T_FORM, 0, 1)) : 0;
  const lightT = elapsed > T_DRIFT + T_FORM ? clamp((elapsed - T_DRIFT - T_FORM) / T_LIGHTUP, 0, 1) : 0;
  const revealT = elapsed > T_DRIFT + T_FORM + T_LIGHTUP ? easeOutQuart(clamp((elapsed - T_DRIFT - T_FORM - T_LIGHTUP) / T_REVEAL, 0, 1)) : 0;

  const brainActive = formT > 0;
  const settled = formT > 0.9;
  const pulse = Math.sin(elapsed * 0.002) * 0.5 + 0.5;
  const br = Math.min(window.innerWidth, window.innerHeight) * 0.28;

  /* ── Background ── */
  ctx.fillStyle = '#020a1a';
  ctx.fillRect(0, 0, dw2, dh2);

  // Radial depth
  const bgGrad = ctx.createRadialGradient(ccx, ccy, 0, ccx, ccy, Math.max(dw2, dh2) * 0.7);
  bgGrad.addColorStop(0, 'rgba(15, 30, 70, 0.5)');
  bgGrad.addColorStop(0.5, 'rgba(8, 18, 45, 0.3)');
  bgGrad.addColorStop(1, 'rgba(2, 10, 26, 0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, dw2, dh2);

  /* ── Stars ── */
  for (const s of stars) {
    const twinkle = 0.2 + Math.sin(elapsed * 0.001 * s.speed + s.phase) * 0.5;
    ctx.fillStyle = `rgba(148, 180, 220, ${twinkle * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  /* ── Update particles ── */
  for (const p of particles) {
    p.prevX = p.x;
    p.prevY = p.y;

    if (!brainActive) {
      // Drift: gentle orbit
      p.spiralAngle += 0.0008;
      const swirl = 0.001;
      const dx = p.x - ccx;
      const dy = p.y - ccy;
      p.vx = (p.vx || 0) + (-dy * swirl * 0.03 + Math.cos(p.spiralAngle) * 0.005);
      p.vy = (p.vy || 0) + (dx * swirl * 0.03 + Math.sin(p.spiralAngle) * 0.005);
      p.vx *= 0.997; p.vy *= 0.997;
      p.x += p.vx; p.y += p.vy;
      if (p.x < 40 || p.x > window.innerWidth - 40) p.vx *= -0.5;
      if (p.y < 40 || p.y > window.innerHeight - 40) p.vy *= -0.5;
    } else {
      // Converge with spiral
      const dx = p.tx - p.x;
      const dy = p.ty - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const pull = 0.01 + formT * formT * 0.14;
      const perpX = dist > 1 ? -dy / dist : 0;
      const perpY = dist > 1 ? dx / dist : 0;
      const spiral = (1 - formT) * (1 - formT) * 2;
      p.x += dx * pull + perpX * spiral;
      p.y += dy * pull + perpY * spiral;
    }

    p.glowPhase += 0.025;
  }

  /* ── Particle trails during convergence ── */
  if (formT > 0 && formT < 1) {
    for (const p of particles) {
      const dx = p.x - p.prevX;
      const dy = p.y - p.prevY;
      const speed = Math.sqrt(dx * dx + dy * dy);
      if (speed > 0.5) {
        const ta = formT * 0.4;
        const grad = ctx.createLinearGradient(p.prevX, p.prevY, p.x, p.y);
        grad.addColorStop(0, `rgba(59, 130, 246, 0)`);
        grad.addColorStop(1, `rgba(96, 165, 250, ${ta})`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = p.size * 0.4;
        ctx.beginPath();
        ctx.moveTo(p.prevX, p.prevY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
    }
  }

  /* ── Neural connections ── */
  if (settled && lightT > 0) {
    const hash = buildSpatialHash(particles, 40);
    ctx.lineWidth = 0.35;
    for (let i = 0; i < particles.length; i += 3) {
      const a = particles[i];
      const neighbors = getNeighbors(hash, a.x, a.y, 40);
      for (const j of neighbors) {
        if (j <= i) continue;
        const b = particles[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const distSq = dx * dx + dy * dy;
        if (distSq < 2000) {
          const dist = Math.sqrt(distSq);
          const la = (1 - dist / 44.7) * 0.55 * lightT;
          ctx.strokeStyle = `rgba(59, 130, 246, ${la})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
  }

  /* ── Draw particles ── */
  for (const p of particles) {
    const glow = 0.5 + Math.sin(p.glowPhase) * 0.4;
    const sz = p.size * (brainActive ? (1 + pulse * 0.2) : 1);

    // Glow halo
    const glowR = sz * (brainActive ? 4 : 2.5);
    const gg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
    const ga = p.alpha * glow * 0.45;
    gg.addColorStop(0, `rgba(96, 165, 250, ${ga})`);
    gg.addColorStop(1, `rgba(59, 130, 246, 0)`);
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Core
    const ca = p.alpha * (0.6 + glow * 0.4);
    ctx.fillStyle = `rgba(180, 215, 255, ${ca})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();

    // Junction starburst
    if (p.isJunction && settled) {
      const jAlpha = 0.6 * lightT;
      const jg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 6);
      jg.addColorStop(0, `rgba(200, 225, 255, ${jAlpha * 0.8})`);
      jg.addColorStop(0.3, `rgba(100, 160, 255, ${jAlpha * 0.3})`);
      jg.addColorStop(1, `rgba(59, 130, 246, 0)`);
      ctx.fillStyle = jg;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 6, 0, Math.PI * 2);
      ctx.fill();

      // Rays
      ctx.strokeStyle = `rgba(180, 215, 255, ${jAlpha * 0.5})`;
      ctx.lineWidth = 0.6;
      for (let r = 0; r < 4; r++) {
        const ra2 = (r / 4) * Math.PI * 2 + p.glowPhase * 0.3;
        const rLen = sz * (3 + Math.sin(p.glowPhase + r) * 1.5);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + Math.cos(ra2) * rLen, p.y + Math.sin(ra2) * rLen);
        ctx.stroke();
      }
    }
  }

  /* ── Central brain glow ── */
  if (brainActive) {
    const ra = formT * 0.35;
    const rSize = br * (0.7 + formT * 0.5 + pulse * 0.1);
    const rg = ctx.createRadialGradient(ccx, ccy, 0, ccx, ccy, rSize);
    rg.addColorStop(0, `rgba(40, 100, 200, ${ra * 0.5})`);
    rg.addColorStop(0.4, `rgba(30, 70, 160, ${ra * 0.25})`);
    rg.addColorStop(1, `rgba(15, 40, 120, 0)`);
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(ccx, ccy, rSize, 0, Math.PI * 2);
    ctx.fill();
  }

  /* ── Energy stream from bottom ── */
  if (brainActive) {
    const streamAlpha = formT * 0.5 * (0.6 + pulse * 0.4);
    const streamW = br * 0.35;
    // Main beam
    const sg = ctx.createLinearGradient(ccx, ccy + br * 0.6, ccx, ccy + br * 2.8);
    sg.addColorStop(0, `rgba(96, 165, 255, ${streamAlpha * 0.8})`);
    sg.addColorStop(0.3, `rgba(59, 130, 246, ${streamAlpha * 0.4})`);
    sg.addColorStop(0.7, `rgba(30, 80, 200, ${streamAlpha * 0.15})`);
    sg.addColorStop(1, `rgba(20, 50, 150, 0)`);
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(ccx - streamW * 0.2, ccy + br * 0.65);
    ctx.quadraticCurveTo(ccx - streamW * 1.2, ccy + br * 1.6, ccx - streamW * 0.6, ccy + br * 2.8);
    ctx.lineTo(ccx + streamW * 0.6, ccy + br * 2.8);
    ctx.quadraticCurveTo(ccx + streamW * 1.2, ccy + br * 1.6, ccx + streamW * 0.2, ccy + br * 0.65);
    ctx.closePath();
    ctx.fill();

    // Core beam (brighter center)
    const cb = ctx.createLinearGradient(ccx, ccy + br * 0.7, ccx, ccy + br * 2.2);
    cb.addColorStop(0, `rgba(150, 200, 255, ${streamAlpha * 0.5})`);
    cb.addColorStop(0.5, `rgba(96, 165, 255, ${streamAlpha * 0.2})`);
    cb.addColorStop(1, `rgba(59, 130, 246, 0)`);
    ctx.fillStyle = cb;
    ctx.beginPath();
    ctx.moveTo(ccx - streamW * 0.08, ccy + br * 0.7);
    ctx.lineTo(ccx - streamW * 0.15, ccy + br * 2.5);
    ctx.lineTo(ccx + streamW * 0.15, ccy + br * 2.5);
    ctx.lineTo(ccx + streamW * 0.08, ccy + br * 0.7);
    ctx.closePath();
    ctx.fill();
  }

  /* ── Bottom platform rings ── */
  if (brainActive) {
    const platY = ccy + br * 2.2;
    const ringCount = 6;
    for (let i = 0; i < ringCount; i++) {
      const ringR = br * (0.25 + i * 0.2);
      const ringAlpha = formT * 0.3 * (1 - i * 0.15) * (0.5 + pulse * 0.5);
      ctx.strokeStyle = `rgba(59, 130, 246, ${ringAlpha})`;
      ctx.lineWidth = 2 - i * 0.25;
      ctx.beginPath();
      ctx.ellipse(ccx, platY, ringR, ringR * 0.12, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Platform center glow
    const pg = ctx.createRadialGradient(ccx, platY, 0, ccx, platY, br * 0.6);
    pg.addColorStop(0, `rgba(120, 180, 255, ${formT * 0.4 * (0.6 + pulse * 0.4)})`);
    pg.addColorStop(0.5, `rgba(59, 130, 246, ${formT * 0.15})`);
    pg.addColorStop(1, `rgba(30, 80, 200, 0)`);
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(ccx, platY, br * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  animId = requestAnimationFrame(render);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* ═══════════════════ UI ANIMATIONS ═══════════════════ */

function animateUI() {
  const el = (id) => document.getElementById(id);

  // Logo appears first
  setTimeout(() => {
    el('logoArea').style.transition = 'opacity 1.2s ease, transform 1.2s ease';
    el('logoArea').style.opacity = '1';
    el('logoArea').style.transform = 'translateY(0)';
  }, T_DRIFT + T_FORM - 500);

  // Title
  setTimeout(() => {
    el('title').style.transition = 'opacity 1s ease';
    el('title').style.opacity = '1';
  }, T_DRIFT + T_FORM + 500);

  // Subtitle
  setTimeout(() => {
    el('subtitle').style.transition = 'opacity 0.8s ease';
    el('subtitle').style.opacity = '1';
  }, T_DRIFT + T_FORM + 1000);

  // Tagline
  setTimeout(() => {
    el('tagline').style.transition = 'opacity 0.8s ease';
    el('tagline').style.opacity = '1';
  }, T_DRIFT + T_FORM + 1500);

  // Feature labels staggered
  ['f1', 'f2', 'f3', 'f4'].forEach((id, i) => {
    setTimeout(() => {
      el(id).style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      el(id).style.opacity = '1';
    }, T_DRIFT + T_FORM + T_LIGHTUP - 500 + i * 300);
  });

  // Progress
  setTimeout(() => {
    el('progressArea').style.transition = 'opacity 0.8s ease';
    el('progressArea').style.opacity = '1';
    el('skipHint').style.transition = 'opacity 0.8s ease';
    el('skipHint').style.opacity = '0.5';

    // Animate progress bar
    let pct = 0;
    const fill = el('progressFill');
    const pctEl = el('progressPct');
    const iv = setInterval(() => {
      pct += 1 + Math.random() * 2;
      if (pct >= 100) {
        pct = 100; clearInterval(iv);
        fill.style.width = '100%';
        pctEl.textContent = '100%';
        // Brief pause at 100%, then gentle fade out
        setTimeout(() => {
          skip();
        }, 1200);
      }
      fill.style.width = pct + '%';
      pctEl.textContent = Math.floor(pct) + '%';
    }, T_PROGRESS / 100);
  }, T_DRIFT + T_FORM + T_LIGHTUP);
}

/* ═══════════════════ SKIP ═══════════════════ */

function skip() {
  if (skipRequested) return;
  skipRequested = true;
  cancelAnimationFrame(animId);

  // Gradual fade out everything over 1.5 seconds
  const canvas = document.getElementById('brain');
  const overlay = document.getElementById('overlay');

  canvas.style.transition = 'opacity 1.5s ease';
  overlay.style.transition = 'opacity 1.5s ease';
  canvas.style.opacity = '0';
  overlay.style.opacity = '0';

  setTimeout(() => {
    document.body.style.background = '#fff';
    canvas.style.display = 'none';
    overlay.style.display = 'none';
    if (window.parent !== window) {
      window.parent.postMessage('splash-complete', '*');
    }
  }, 1600);
}

document.addEventListener('click', skip);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') skip(); });

/* ═══════════════════ INIT ═══════════════════ */

resize();
initParticles();
initStars();
render();
animateUI();
window.addEventListener('resize', () => {
  resize();
  initStars();
});
</script>
