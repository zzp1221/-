server:
  port: ${APP_PORT:8081}

spring:
  application:
    name: zhixue-control-plane
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:zhixue}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/zhixue}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5s
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  python-agent:
    base-url: ${PYTHON_AGENT_BASE_URL:http://localhost:8000}
    connect-timeout: 5s
    read-timeout: 10m
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174}
  security:
    jwt:
      issuer: zhixue-control-plane
      secret: ${APP_JWT_SECRET:}
      access-token-ttl: 2h
      refresh-token-ttl: 7d
  idempotency:
    ttl: ${APP_IDEMPOTENCY_TTL:24h}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    user-requests-per-minute: ${APP_RATE_LIMIT_USER_PER_MINUTE:60}
    ip-requests-per-minute: ${APP_RATE_LIMIT_IP_PER_MINUTE:100}
  download:
    artifact-ttl-seconds: ${APP_DOWNLOAD_ARTIFACT_TTL_SECONDS:1800}
