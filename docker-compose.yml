# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

name: zhixue-stack

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zhixue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhixue}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - D:\软件杯\Data\postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./vector_data.dump:/docker-entrypoint-initdb.d/vector_data.dump:ro
      - ./restore_vector_data.sh:/docker-entrypoint-initdb.d/02-restore_vector_data.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zhixue}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - zhixue-net

  mongo:
    image: mongo:7
    container_name: zhixue-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-zhixue}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - D:\软件杯\Data\mongo:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017/${MONGO_DB:-zhixue} --eval 'db.runCommand({ ping: 1 }).ok' | grep 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - zhixue-net

  redis:
    image: redis:7-alpine
    container_name: zhixue-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - D:\软件杯\Data\redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - zhixue-net

  object-storage:
    image: minio/minio:latest
    container_name: zhixue-object-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - D:\软件杯\Data\object-storage:/data
    networks:
      - zhixue-net

  object-storage-init:
    image: minio/mc:latest
    container_name: zhixue-object-storage-init
    depends_on:
      object-storage:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://object-storage:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin123}; do
        echo 'waiting for object storage...';
        sleep 2;
      done;
      mc mb -p local/${S3_BUCKET:-zhixue-resources} || true;
      mc anonymous set none local/${S3_BUCKET:-zhixue-resources} || true;
      exit 0;
      "
    restart: "no"
    networks:
      - zhixue-net

  # Java 控制面 / BFF
  # 启动前请先在 ./project 执行 mvn package，Dockerfile 会直接装载已生成的 jar。
  app:
    build:
      context: ./project
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-zhixue-java-app:local}
    container_name: zhixue-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully
      python-agent:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-zhixue}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_STORAGE_ENDPOINT: http://object-storage:9000
      APP_STORAGE_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      APP_STORAGE_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      APP_STORAGE_BUCKET: ${S3_BUCKET:-zhixue-resources}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-zhixue-local-dev-secret-key-123456}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174}
      AI_OPENAI_COMPATIBLE_API_KEY: ${AI_OPENAI_COMPATIBLE_API_KEY:-}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/${MONGO_DB:-zhixue}
      PYTHON_AGENT_BASE_URL: http://python-agent:8000
    ports:
      - "${APP_PORT:-8081}:8081"
    volumes:
      - D:\软件杯\Data\logs:/app/logs
      - D:\软件杯\Data\sandbox-temp:/data/sandbox-temp
    networks:
      - zhixue-net

  # Python Agent 运行面
  python-agent:
    build:
      context: ./python-agent
      dockerfile: Dockerfile
    image: ${PY_AGENT_IMAGE:-zhixue-python-agent:local}
    container_name: zhixue-python-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-zhixue}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-zhixue}
      MINIO_ENDPOINT: object-storage:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${S3_BUCKET:-zhixue-resources}
      OPENAI_COMPATIBLE_API_KEY: ${AI_OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${AI_OPENAI_COMPATIBLE_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      MIMO_API_KEY: ${MIMO_API_KEY:-${AI_OPENAI_COMPATIBLE_API_KEY:-}}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      SANDBOX_ROOT: /data/sandbox-temp
      AVATAR_DATA_DIR: /data/sandbox-temp/avatar_data
    ports:
      - "${PY_AGENT_PORT:-8000}:8000"
    volumes:
      - ./wiki:/app/wiki:ro
      - D:\软件杯\Data\sandbox-temp:/data/sandbox-temp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - zhixue-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: zhixue-frontend:local
    container_name: zhixue-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - zhixue-net

networks:
  zhixue-net:
    driver: bridge
